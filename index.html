<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabrina English Daily Lesson</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --bg-soft: #172033;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.13);
      --text: #f8fafc;
      --muted: #b9c3d1;
      --faint: #7c8798;
      --line: rgba(255, 255, 255, 0.14);
      --rose: #fb7185;
      --gold: #f6c453;
      --mint: #6ee7b7;
      --sky: #7dd3fc;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(251, 113, 133, 0.22), transparent 34rem),
        radial-gradient(circle at 92% 14%, rgba(125, 211, 252, 0.20), transparent 32rem),
        linear-gradient(145deg, #0f172a 0%, #111827 48%, #1f2937 100%);
    }

    button {
      font: inherit;
    }

    .page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 30px 20px 44px;
    }

    .shell {
      display: grid;
      gap: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.58);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.1rem, 6vw, 4.35rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 650px;
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.18rem);
      line-height: 1.65;
    }

    .date-card {
      min-width: 190px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .date-card span {
      display: block;
      color: var(--faint);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .date-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.18rem;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .section-title {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      border-radius: var(--radius);
      color: #101827;
      background: var(--mint);
      font-weight: 900;
    }

    h2 {
      font-size: clamp(1.35rem, 4vw, 2.05rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .mode-name {
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 700;
      text-align: right;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .lesson-grid.single {
      grid-template-columns: 1fr;
    }

    .lesson-card,
    .history-card {
      position: relative;
      display: grid;
      gap: 14px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel-strong), rgba(255, 255, 255, 0.06));
    }

    .lesson-card {
      padding: 20px;
    }

    .lesson-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      border-radius: var(--radius) 0 0 var(--radius);
      background: linear-gradient(180deg, var(--rose), var(--sky));
    }

    .item-top {
      display: flex;
      gap: 12px;
      align-items: start;
      justify-content: space-between;
      min-width: 0;
    }

    .word-block {
      min-width: 0;
    }

    .item-main {
      overflow-wrap: anywhere;
      font-size: clamp(1.28rem, 4vw, 1.85rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .phonetic {
      margin-top: 7px;
      color: var(--sky);
      font-size: 0.98rem;
      font-weight: 800;
    }

    .translation,
    .usage {
      color: var(--gold);
      font-size: 1.03rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .example-list {
      display: grid;
      gap: 9px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .example,
    .example-list li {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.58;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 2px;
    }

    .icon-btn,
    .learn-btn,
    .clear-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .icon-btn {
      width: 44px;
      flex: 0 0 44px;
      font-size: 1.06rem;
    }

    .learn-btn,
    .clear-btn {
      padding: 0 14px;
      font-weight: 850;
    }

    .learn-btn {
      color: #082f49;
      border-color: rgba(125, 211, 252, 0.72);
      background: var(--sky);
    }

    .clear-btn {
      color: #fff1f2;
      border-color: rgba(251, 113, 133, 0.52);
      background: rgba(251, 113, 133, 0.16);
    }

    .icon-btn:hover,
    .learn-btn:hover,
    .clear-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.16);
    }

    .learn-btn:hover {
      color: #082f49;
      background: #bae6fd;
    }

    .clear-btn:hover {
      background: rgba(251, 113, 133, 0.28);
    }

    .learn-btn:disabled {
      color: #0f5132;
      border-color: rgba(110, 231, 183, 0.42);
      background: rgba(110, 231, 183, 0.35);
      cursor: default;
      transform: none;
    }

    .empty {
      padding: 22px 24px;
      color: var(--muted);
      line-height: 1.55;
    }

    .history-list {
      display: grid;
      gap: 12px;
      padding: 20px;
    }

    .history-card {
      grid-template-columns: minmax(96px, 0.22fr) 1fr;
      gap: 16px;
      align-items: start;
      padding: 16px;
    }

    .history-date {
      color: var(--mint);
      font-size: 0.95rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .history-item {
      min-width: 0;
    }

    .history-item strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 1.04rem;
      line-height: 1.35;
    }

    .history-item span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 5;
      max-width: min(360px, calc(100vw - 40px));
      padding: 13px 16px;
      border: 1px solid rgba(110, 231, 183, 0.38);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(15, 23, 42, 0.92);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 760px) {
      .page {
        padding: 16px 12px 28px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 22px;
      }

      .date-card {
        min-width: 0;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
        padding: 18px;
      }

      .mode-name {
        text-align: left;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .lesson-card {
        padding: 18px;
      }

      .history-list {
        padding: 14px;
      }

      .history-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Daily English</p>
          <h1>Sabrina English</h1>
          <p class="subtitle" id="lessonSubtitle"></p>
        </div>
        <div class="date-card" aria-label="Current lesson date">
          <span>Today</span>
          <strong id="dateText"></strong>
        </div>
      </header>

      <section class="panel" aria-labelledby="todayTitle">
        <div class="section-head">
          <div class="section-title">
            <span class="badge" id="modeBadge">A</span>
            <h2 id="todayTitle">Today's Lesson</h2>
          </div>
          <div class="mode-name" id="modeName"></div>
        </div>
        <div class="lesson-grid" id="lessonGrid"></div>
      </section>

      <section class="panel" aria-labelledby="historyTitle">
        <div class="section-head">
          <div class="section-title">
            <span class="badge">✓</span>
            <h2 id="historyTitle">Learned History</h2>
          </div>
          <button class="clear-btn" id="clearHistory" type="button">Clear All</button>
        </div>
        <div id="historyContent"></div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "sabrinaEnglishLearnedHistory";

    const lessonBank = {
      A: [
        [
          { word: "curious", phonetic: "/ˈkjʊriəs/", translation: "好奇的", example: "She is curious about how stars are born." },
          { word: "journey", phonetic: "/ˈdʒɜːrni/", translation: "旅程", example: "Every long journey starts with one small step." },
          { word: "gentle", phonetic: "/ˈdʒentl/", translation: "温柔的；轻柔的", example: "Use a gentle voice when you speak to a baby." },
          { word: "bright", phonetic: "/braɪt/", translation: "明亮的；聪明的", example: "The room looks bright in the morning sun." },
          { word: "practice", phonetic: "/ˈpræktɪs/", translation: "练习", example: "A little practice every day makes English easier." }
        ],
        [
          { word: "focus", phonetic: "/ˈfoʊkəs/", translation: "专注；焦点", example: "Please focus on one question at a time." },
          { word: "brave", phonetic: "/breɪv/", translation: "勇敢的", example: "It was brave of him to speak in front of the class." },
          { word: "tiny", phonetic: "/ˈtaɪni/", translation: "很小的", example: "A tiny seed can become a tall tree." },
          { word: "simple", phonetic: "/ˈsɪmpl/", translation: "简单的", example: "This recipe is simple and quick." },
          { word: "arrive", phonetic: "/əˈraɪv/", translation: "到达", example: "We will arrive at the station before noon." }
        ],
        [
          { word: "patient", phonetic: "/ˈpeɪʃnt/", translation: "有耐心的", example: "A patient teacher explains things many times." },
          { word: "promise", phonetic: "/ˈprɑːmɪs/", translation: "承诺", example: "I promise to call you after school." },
          { word: "fresh", phonetic: "/freʃ/", translation: "新鲜的", example: "The bakery sells fresh bread every morning." },
          { word: "quiet", phonetic: "/ˈkwaɪət/", translation: "安静的", example: "The library is quiet after lunch." },
          { word: "choose", phonetic: "/tʃuːz/", translation: "选择", example: "You can choose the blue cup or the green cup." }
        ],
        [
          { word: "careful", phonetic: "/ˈkerfl/", translation: "小心的；仔细的", example: "Be careful when you cross the street." },
          { word: "share", phonetic: "/ʃer/", translation: "分享", example: "They share a snack during the break." },
          { word: "garden", phonetic: "/ˈɡɑːrdn/", translation: "花园", example: "Grandma grows tomatoes in her garden." },
          { word: "listen", phonetic: "/ˈlɪsn/", translation: "听", example: "Listen to the question before you answer." },
          { word: "wonderful", phonetic: "/ˈwʌndərfl/", translation: "很棒的", example: "We had a wonderful dinner with friends." }
        ],
        [
          { word: "decide", phonetic: "/dɪˈsaɪd/", translation: "决定", example: "They need to decide where to eat tonight." },
          { word: "excited", phonetic: "/ɪkˈsaɪtɪd/", translation: "兴奋的", example: "I am excited about the school trip." },
          { word: "useful", phonetic: "/ˈjuːsfl/", translation: "有用的", example: "This map is useful when you visit a new city." },
          { word: "hungry", phonetic: "/ˈhʌŋɡri/", translation: "饿的", example: "The children are hungry after swimming." },
          { word: "finish", phonetic: "/ˈfɪnɪʃ/", translation: "完成", example: "Please finish your homework before dinner." }
        ],
        [
          { word: "healthy", phonetic: "/ˈhelθi/", translation: "健康的", example: "Fruit and vegetables help you stay healthy." },
          { word: "carry", phonetic: "/ˈkæri/", translation: "携带；搬", example: "Can you carry this bag for me?" },
          { word: "inside", phonetic: "/ɪnˈsaɪd/", translation: "在里面", example: "The keys are inside the drawer." },
          { word: "often", phonetic: "/ˈɔːfn/", translation: "经常", example: "We often walk in the park after dinner." },
          { word: "special", phonetic: "/ˈspeʃl/", translation: "特别的", example: "Today is special because it is her birthday." }
        ],
        [
          { word: "remember", phonetic: "/rɪˈmembər/", translation: "记得", example: "Remember to bring your book tomorrow." },
          { word: "friendly", phonetic: "/ˈfrendli/", translation: "友好的", example: "The new student is friendly to everyone." },
          { word: "clean", phonetic: "/kliːn/", translation: "干净的；打扫", example: "Please keep your desk clean." },
          { word: "answer", phonetic: "/ˈænsər/", translation: "回答；答案", example: "Do you know the answer to this question?" },
          { word: "almost", phonetic: "/ˈɔːlmoʊst/", translation: "几乎", example: "We are almost ready to leave." }
        ]
      ],
      B: [
        [
          { expression: "Take your time.", usage: "让对方慢慢来，不用着急。", example: "Take your time. We still have ten minutes." },
          { expression: "Sounds good.", usage: "表示同意或觉得计划不错。", example: "Pizza for dinner? Sounds good." },
          { expression: "I see.", usage: "表示明白对方的意思。", example: "I see. So the meeting starts at two." }
        ],
        [
          { expression: "No worries.", usage: "回应道歉或感谢，表示没关系。", example: "No worries. I can help you again." },
          { expression: "Let me check.", usage: "需要确认信息时使用。", example: "Let me check the calendar first." },
          { expression: "Good idea.", usage: "赞同别人的建议。", example: "Good idea. Let's bring some water." }
        ],
        [
          { expression: "What do you mean?", usage: "不理解时礼貌追问。", example: "What do you mean by 'early'?" },
          { expression: "I'm not sure.", usage: "不确定答案时使用。", example: "I'm not sure where I put my notebook." },
          { expression: "That's right.", usage: "确认别人说得正确。", example: "That's right. The shop is next to the bank." }
        ],
        [
          { expression: "Here you go.", usage: "递东西给别人时使用。", example: "Here you go. This is your ticket." },
          { expression: "After you.", usage: "礼貌地让别人先走。", example: "After you. The door is open." },
          { expression: "Just a minute.", usage: "请别人稍等一下。", example: "Just a minute. I need to find my shoes." }
        ],
        [
          { expression: "Have a try.", usage: "鼓励别人试试看。", example: "Have a try. This game is fun." },
          { expression: "It depends.", usage: "表示情况不同，答案也不同。", example: "It depends on the weather." },
          { expression: "Me too.", usage: "表示自己也一样。", example: "I like this song. Me too." }
        ],
        [
          { expression: "Be careful.", usage: "提醒别人注意安全或细节。", example: "Be careful. The floor is wet." },
          { expression: "See you later.", usage: "告别时使用。", example: "See you later. I have a class now." },
          { expression: "Come on.", usage: "鼓励、催促或表达不相信。", example: "Come on. You can finish the race." }
        ],
        [
          { expression: "I'm on my way.", usage: "告诉别人自己正在路上。", example: "I'm on my way. I will be there soon." },
          { expression: "That makes sense.", usage: "表示解释合理、能理解。", example: "That makes sense. We should leave earlier." },
          { expression: "Never mind.", usage: "表示不用在意或算了。", example: "Never mind. We can try again tomorrow." }
        ]
      ],
      C: [
        {
          pattern: "I would like to + verb",
          explanation: "用来礼貌地表达想做某事，比 I want to 更柔和。",
          examples: [
            "I would like to order a sandwich.",
            "I would like to ask a question.",
            "I would like to visit the museum this weekend."
          ]
        },
        {
          pattern: "Can you help me + verb?",
          explanation: "用来请求别人帮忙做某事，适合日常场景。",
          examples: [
            "Can you help me carry this box?",
            "Can you help me find my pencil?",
            "Can you help me open the window?"
          ]
        },
        {
          pattern: "There is / There are",
          explanation: "用来说明某处有某物；单数用 there is，复数用 there are。",
          examples: [
            "There is a cat under the chair.",
            "There are three apples on the table.",
            "There is a new book in my bag."
          ]
        },
        {
          pattern: "I am good at + noun / verb-ing",
          explanation: "用来表达自己擅长某事或某项活动。",
          examples: [
            "I am good at math.",
            "I am good at drawing animals.",
            "I am good at remembering names."
          ]
        },
        {
          pattern: "It is time to + verb",
          explanation: "用来提醒现在该做某事了。",
          examples: [
            "It is time to go home.",
            "It is time to clean your room.",
            "It is time to start the lesson."
          ]
        },
        {
          pattern: "I have to + verb",
          explanation: "用来表达必须做某事，通常是责任或安排。",
          examples: [
            "I have to finish my homework.",
            "I have to wake up early tomorrow.",
            "I have to wear a uniform at school."
          ]
        },
        {
          pattern: "How about + noun / verb-ing?",
          explanation: "用来提出建议或询问对方意见。",
          examples: [
            "How about some tea?",
            "How about playing basketball after school?",
            "How about watching a movie tonight?"
          ]
        }
      ]
    };

    const modeLabels = {
      A: "Vocabulary",
      B: "Common Expressions",
      C: "Sentence Pattern"
    };

    const modeSubtitles = {
      A: "Five words for sharper everyday English.",
      B: "Three phrases that fit real conversations.",
      C: "One pattern you can reuse in many sentences."
    };

    const today = new Date();
    const todayKey = formatDateKey(today);
    const dayOfYear = getDayOfYear(today);
    const mode = pickDailyMode(todayKey);
    const lessonSet = getLessonSet(mode, dayOfYear);

    const lessonGrid = document.getElementById("lessonGrid");
    const dateText = document.getElementById("dateText");
    const modeBadge = document.getElementById("modeBadge");
    const modeName = document.getElementById("modeName");
    const lessonSubtitle = document.getElementById("lessonSubtitle");
    const clearHistory = document.getElementById("clearHistory");
    const historyContent = document.getElementById("historyContent");
    const toast = document.getElementById("toast");

    dateText.textContent = new Intl.DateTimeFormat("en-US", {
      weekday: "short",
      month: "short",
      day: "numeric",
      year: "numeric"
    }).format(today);
    modeBadge.textContent = mode;
    modeName.textContent = `Mode ${mode}: ${modeLabels[mode]}`;
    lessonSubtitle.textContent = modeSubtitles[mode];

    renderLesson();
    renderHistory();

    clearHistory.addEventListener("click", () => {
      const history = getHistory();
      if (!history.length) {
        showToast("History is already empty.");
        return;
      }

      localStorage.removeItem(STORAGE_KEY);
      renderLesson();
      renderHistory();
      showToast("Learned history cleared.");
    });

    function renderLesson() {
      const history = getHistory();
      lessonGrid.innerHTML = "";
      lessonGrid.classList.toggle("single", mode === "C");

      getDisplayItems(mode, lessonSet).forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "lesson-card";

        const learned = history.some((entry) => entry.key === item.key);
        const top = document.createElement("div");
        top.className = "item-top";

        const wordBlock = document.createElement("div");
        wordBlock.className = "word-block";
        const title = document.createElement("div");
        title.className = "item-main";
        title.textContent = item.title;
        wordBlock.appendChild(title);

        if (item.phonetic) {
          const phonetic = document.createElement("div");
          phonetic.className = "phonetic";
          phonetic.textContent = item.phonetic;
          wordBlock.appendChild(phonetic);
        }

        const speakButton = document.createElement("button");
        speakButton.className = "icon-btn";
        speakButton.type = "button";
        speakButton.textContent = "🔊";
        speakButton.setAttribute("aria-label", `Play pronunciation for ${item.title}`);
        speakButton.title = "Pronunciation";
        speakButton.addEventListener("click", () => speakEnglish(item.speech));

        top.append(wordBlock, speakButton);
        card.appendChild(top);

        if (item.note) {
          const note = document.createElement("p");
          note.className = item.noteClass;
          note.textContent = item.note;
          card.appendChild(note);
        }

        if (item.examples.length === 1) {
          const example = document.createElement("p");
          example.className = "example";
          example.textContent = item.examples[0];
          card.appendChild(example);
        } else {
          const list = document.createElement("ul");
          list.className = "example-list";
          item.examples.forEach((exampleText) => {
            const li = document.createElement("li");
            li.textContent = exampleText;
            list.appendChild(li);
          });
          card.appendChild(list);
        }

        const actions = document.createElement("div");
        actions.className = "actions";
        const learnButton = document.createElement("button");
        learnButton.className = "learn-btn";
        learnButton.type = "button";
        learnButton.textContent = learned ? "Learned ✓" : "Mark as Learned ✓";
        learnButton.disabled = learned;
        learnButton.addEventListener("click", () => markLearned(item, index));
        actions.appendChild(learnButton);
        card.appendChild(actions);

        lessonGrid.appendChild(card);
      });
    }

    function getDisplayItems(currentMode, set) {
      if (currentMode === "A") {
        return set.map((item, index) => ({
          key: `${todayKey}:A:${index}:${item.word}`,
          mode: "Vocabulary",
          title: item.word,
          phonetic: item.phonetic,
          note: item.translation,
          noteClass: "translation",
          examples: [item.example],
          speech: `${item.word}. ${item.example}`
        }));
      }

      if (currentMode === "B") {
        return set.map((item, index) => ({
          key: `${todayKey}:B:${index}:${item.expression}`,
          mode: "Expression",
          title: item.expression,
          phonetic: "",
          note: item.usage,
          noteClass: "usage",
          examples: [item.example],
          speech: `${item.expression}. ${item.example}`
        }));
      }

      return [{
        key: `${todayKey}:C:0:${set.pattern}`,
        mode: "Sentence Pattern",
        title: set.pattern,
        phonetic: "",
        note: set.explanation,
        noteClass: "usage",
        examples: set.examples,
        speech: `${set.pattern}. ${set.examples.join(" ")}`
      }];
    }

    function markLearned(item) {
      const history = getHistory();
      if (history.some((entry) => entry.key === item.key)) {
        showToast("Already saved.");
        renderLesson();
        return;
      }

      history.unshift({
        key: item.key,
        date: todayKey,
        mode: item.mode,
        title: item.title,
        detail: item.note || item.examples[0]
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      renderLesson();
      renderHistory();
      showToast("Saved to learned history.");
    }

    function renderHistory() {
      const history = getHistory();
      clearHistory.hidden = history.length === 0;

      if (!history.length) {
        historyContent.innerHTML = `<p class="empty">No learned items yet.</p>`;
        return;
      }

      const list = document.createElement("div");
      list.className = "history-list";
      history.forEach((entry) => {
        const card = document.createElement("article");
        card.className = "history-card";

        const date = document.createElement("div");
        date.className = "history-date";
        date.textContent = formatHistoryDate(entry.date);

        const item = document.createElement("div");
        item.className = "history-item";
        const title = document.createElement("strong");
        title.textContent = entry.title;
        const detail = document.createElement("span");
        detail.textContent = `${entry.mode} · ${entry.detail}`;
        item.append(title, detail);

        card.append(date, item);
        list.appendChild(card);
      });

      historyContent.replaceChildren(list);
    }

    function getHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function speakEnglish(text) {
      if (!("speechSynthesis" in window)) {
        showToast("Speech is not available in this browser.");
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const englishVoice = voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en"));
      if (englishVoice) {
        utterance.voice = englishVoice;
      }

      window.speechSynthesis.speak(utterance);
    }

    function pickDailyMode(seed) {
      const modes = ["A", "B", "C"];
      return modes[Math.abs(hashString(seed)) % modes.length];
    }

    function getLessonSet(currentMode, dayNumber) {
      const sets = lessonBank[currentMode];
      return sets[(dayNumber - 1) % sets.length];
    }

    function getDayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start + (start.getTimezoneOffset() - date.getTimezoneOffset()) * 60000;
      return Math.floor(diff / 86400000);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatHistoryDate(dateKey) {
      const [year, month, day] = dateKey.split("-").map(Number);
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(new Date(year, month - 1, day));
    }

    function hashString(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += 1) {
        hash = ((hash << 5) - hash + value.charCodeAt(index)) | 0;
      }
      return hash;
    }

    let toastTimer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1900);
    }
  </script>
</body>
</html>
